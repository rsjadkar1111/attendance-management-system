{% extends 'attendance/base.html' %}

{% block title %}Add Student - Attendance System{% endblock %}

{% block content %}
<div class="form-container">
    <h1>Add New Student</h1>
    
    <form method="post" class="student-form">
        {% csrf_token %}
        <div class="form-row">
            <div class="form-group">
                <label for="roll_number">Roll Number: *</label>
                <input type="text" id="roll_number" name="roll_number" required placeholder="e.g., CS101">
            </div>
            <div class="form-group">
                <label for="name">Full Name: *</label>
                <input type="text" id="name" name="name" required placeholder="e.g., John Doe">
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="email">Email: *</label>
                <input type="email" id="email" name="email" required placeholder="e.g., student@example.com">
            </div>
            <div class="form-group">
                <label for="phone">Phone:</label>
                <input type="tel" id="phone" name="phone" placeholder="e.g., +1234567890">
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="department">Department: *</label>
                <input type="text" id="department" name="department" required placeholder="e.g., Computer Science">
            </div>
            <div class="form-group">
                <label for="year">Year: *</label>
                <select id="year" name="year" required>
                    <option value="">Select Year</option>
                    <option value="First Year">First Year</option>
                    <option value="Second Year">Second Year</option>
                    <option value="Third Year">Third Year</option>
                    <option value="Fourth Year">Fourth Year</option>
                </select>
            </div>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Add Student</button>
            <a href="{% url 'student_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
